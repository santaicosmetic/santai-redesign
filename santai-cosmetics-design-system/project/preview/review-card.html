<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Reviews / star block</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 22px 28px; background: var(--bg); font-family: var(--font-body); }
  .review { max-width: 560px; }
  .stars { display: inline-flex; gap: 2px; color: var(--accent); }
  .stars svg { width: 14px; height: 14px; }
  .meta { display: flex; gap: 12px; align-items: center; margin-top: 12px; }
  .avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--bg-card); border: 1px solid var(--line); }
  .name { font-size: 13px; color: var(--fg); font-weight: 500; }
  .verify { font-size: 11px; color: var(--santai-jade); letter-spacing: .12em; text-transform: uppercase; display: inline-flex; align-items: center; gap: 4px; }
  .quote { font-family: var(--font-display-italic); font-style: italic; font-size: 22px; line-height: 1.4; color: var(--fg); margin-top: 10px; }
  .tags { display: flex; gap: 6px; margin-top: 10px; }
  .tag { font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: var(--fg-muted); border: 1px solid var(--line); padding: 4px 10px; border-radius: 999px; }
</style>
</head>
<body>
  <div class="review">
    <div class="stars">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3 7h7l-5.5 4.5L18 21l-6-4-6 4 1.5-7.5L2 9h7z"/></svg>
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3 7h7l-5.5 4.5L18 21l-6-4-6 4 1.5-7.5L2 9h7z"/></svg>
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3 7h7l-5.5 4.5L18 21l-6-4-6 4 1.5-7.5L2 9h7z"/></svg>
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3 7h7l-5.5 4.5L18 21l-6-4-6 4 1.5-7.5L2 9h7z"/></svg>
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3 7h7l-5.5 4.5L18 21l-6-4-6 4 1.5-7.5L2 9h7z"/></svg>
    </div>
    <div class="quote">Genuinely faster than mascara. I'm a monolid and Style 02 just sits.</div>
    <div class="meta">
      <div class="avatar"></div>
      <div>
        <div class="name">Aisyah R.</div>
        <span class="verify">✓ Verified buyer</span>
      </div>
    </div>
    <div class="tags"><span class="tag">Monolid</span><span class="tag">Office</span><span class="tag">First-timer</span></div>
  </div>
</body>
</html>
