<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Type — Headings</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 28px 32px; background: var(--bg); }
  .row { display: grid; grid-template-columns: 80px 1fr; gap: 16px; align-items: baseline; padding: 8px 0; border-bottom: 1px solid var(--line); }
  .row:last-child { border-bottom: 0; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); letter-spacing: .04em; }
  .pairing { display: inline-block; font-family: var(--font-body); font-size: 11px; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; color: var(--fg-muted); padding: 4px 10px; border: 1px solid var(--line); margin-bottom: 16px; }
</style>
</head>
<body>
  <div class="pairing">Cormorant Garamond &nbsp;·&nbsp; Westman-style</div>
  <div class="row"><span class="meta">display-m</span><div class="display-m">Sub-section headlines</div></div>
  <div class="row"><span class="meta">h1</span><h1>Page title in display serif</h1></div>
  <div class="row"><span class="meta">h2</span><h2>Card title, blog header</h2></div>
  <div class="row"><span class="meta">h3</span><h3>Style 04 — Doe Eye</h3></div>
</body>
</html>
