<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Eye-shape icons</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 24px; background: var(--bg); font-family: var(--font-body); }
  .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .lbl { font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: var(--fg-soft); }
  img { width: 80px; height: 56px; }
</style>
</head>
<body>
  <div class="grid">
    <div class="cell"><img src="../assets/eye-shapes/almond.svg"/><span class="lbl">Almond</span></div>
    <div class="cell"><img src="../assets/eye-shapes/hooded.svg"/><span class="lbl">Hooded</span></div>
    <div class="cell"><img src="../assets/eye-shapes/monolid.svg"/><span class="lbl">Monolid</span></div>
    <div class="cell"><img src="../assets/eye-shapes/round.svg"/><span class="lbl">Round</span></div>
    <div class="cell"><img src="../assets/eye-shapes/upturned.svg"/><span class="lbl">Upturned</span></div>
    <div class="cell"><img src="../assets/eye-shapes/downturned.svg"/><span class="lbl">Downturned</span></div>
  </div>
</body>
</html>
