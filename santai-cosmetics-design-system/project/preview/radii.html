<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 24px; background: var(--bg); font-family: var(--font-body); }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 84px; height: 84px; background: var(--bg-card); border: 1px solid var(--line); }
  .lbl { font-size: 11px; color: var(--fg-soft); }
  .px { font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); }
</style>
</head>
<body>
  <div class="grid">
    <div class="cell"><div class="box" style="border-radius:0"></div><span class="lbl">card / image</span><span class="px">0</span></div>
    <div class="cell"><div class="box" style="border-radius:4px"></div><span class="lbl">button / input</span><span class="px">4</span></div>
    <div class="cell"><div class="box" style="border-radius:4px"></div><span class="lbl">image-soft</span><span class="px">4</span></div>
    <div class="cell"><div class="box" style="border-radius:8px"></div><span class="lbl">modal</span><span class="px">8</span></div>
    <div class="cell"><div class="box" style="border-radius:999px"></div><span class="lbl">chip</span><span class="px">999</span></div>
  </div>
</body>
</html>
