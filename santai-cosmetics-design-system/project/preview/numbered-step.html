<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Eyebrow + numbered display</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 24px 32px; background: var(--bg); display: flex; gap: 32px; align-items: flex-start; }
  .num { font: 300 96px/0.9 var(--font-display); color: var(--fg); }
  .body { padding-top: 6px; }
  .eb { color: var(--fg-muted); }
</style>
</head>
<body>
  <div class="num">01</div>
  <div class="body">
    <div class="eyebrow eb">How it works</div>
    <h2 style="margin-top:10px;font-size:24px">Place at the lash line.</h2>
    <p style="margin-top:8px;color:var(--fg-soft);font-size:14px;max-width:36ch">Hold the magnetic strip a hair above your natural lash line — the magnets will guide themselves home.</p>
  </div>
</body>
</html>
