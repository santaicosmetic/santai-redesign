<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 28px 32px; background: var(--bg); }
  .row { display: flex; flex-wrap: wrap; gap: 14px; align-items: center; }
  .row + .row { margin-top: 14px; }
</style>
</head>
<body>
  <div class="row">
    <button class="btn">Add to bag</button>
    <button class="btn btn-secondary">See how easy</button>
    <button class="btn btn-accent">Find my lash</button>
    <a class="btn-ghost" href="#">Read more →</a>
  </div>
</body>
</html>
